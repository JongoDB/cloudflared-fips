<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 80" width="150" height="80">
  <defs>
    <filter id="ts">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>

  <!-- Back cloud (golden orange, peeks out behind on the right) -->
  <ellipse cx="118" cy="48" rx="26" ry="24" fill="#FBAD41"/>

  <!-- Front cloud (Cloudflare orange) -->
  <path d="
    M8 64
    C0 64 -2 54 4 48
    C0 38 10 30 22 30
    C24 20 34 14 46 14
    C54 14 60 18 64 24
    C70 12 80 6 92 6
    C110 6 120 18 122 34
    C128 32 136 38 136 46
    C136 54 130 64 120 64
    Z
  " fill="#F6821F"/>

  <!-- Subtle white ray (toned down so text pops) -->
  <path d="
    M14 56
    L108 56
    L118 52
    L138 47
    L118 42
    L108 47
    L14 52
    Z
  " fill="#fff" opacity=".5"/>

  <!-- FIPS text — large bold overlay, the hero element -->
  <text
    x="66" y="52"
    font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif"
    font-size="42"
    font-weight="900"
    letter-spacing="5"
    text-anchor="middle"
    fill="#fff"
    filter="url(#ts)"
  >FIPS</text>
</svg>
